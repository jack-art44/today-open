<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>OPEN-AIR — 오픈에어링 판정</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="오픈에어">
<meta name="theme-color" content="#0C0D10">
<link rel="manifest" href='data:application/manifest+json,{"name":"오픈에어링 판정","short_name":"오픈에어","display":"standalone","background_color":"%230C0D10","theme_color":"%230C0D10","start_url":"."}'>
<style>
:root{
  --bg:#0C0D10; --ink:#F5F6F8; --sub:#9AA0AC; --faint:#5B616D;
  --glass:rgba(255,255,255,.055); --glass-b:rgba(255,255,255,.11);
  --good:#7BD8A8; --warn:#E8C177; --bad:#E08A80; --gold:#C9A96A; --ice:#8FC9DE;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;font-weight:400}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ================= HERO ================= */
.sky{position:relative;height:352px;overflow:hidden;
  background:linear-gradient(180deg,#7DB8DE 0%,#A9CFE8 42%,#E9E2D2 78%,#F3E3C2 100%);
  transition:background 1.2s ease}
.sky.theme-warn{background:linear-gradient(180deg,#C0A26C 0%,#D9C298 42%,#EEDFC2 78%,#F6EDD8 100%)}
.sky.theme-bad{background:linear-gradient(180deg,#535E6A 0%,#75818E 42%,#9AA6B0 78%,#B9C3CB 100%)}
.sunGlow{position:absolute;top:-40px;right:-10px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,236,190,.95) 0%,rgba(255,225,160,.35) 42%,transparent 70%);
  filter:blur(2px);transition:opacity 1s}
.sky.theme-bad .sunGlow{opacity:.1}
.cl{position:absolute;background:rgba(255,255,255,.55);border-radius:999px;filter:blur(10px);
  animation:drift linear infinite}
.sky.theme-bad .cl{background:rgba(235,240,244,.5)}
@keyframes drift{from{transform:translateX(-220px)}to{transform:translateX(680px)}}
.rain{position:absolute;inset:0;display:none;pointer-events:none}
.sky.theme-bad .rain.on{display:block}
.streak{position:absolute;top:-30px;width:1.5px;height:22px;border-radius:1px;
  background:linear-gradient(180deg,transparent,rgba(90,110,130,.55));animation:fall .75s linear infinite}
@keyframes fall{to{transform:translateY(400px)}}
.road{position:absolute;left:0;right:0;bottom:0;height:44px;background:#17181D}
.road::before{content:"";position:absolute;top:19px;left:0;right:0;height:2px;
  background:repeating-linear-gradient(90deg,rgba(201,169,106,.55) 0 26px,transparent 26px 62px)}
.chip{position:absolute;z-index:6;display:flex;align-items:center;gap:7px;
  background:rgba(14,15,20,.42);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.16);color:#fff;font-size:12.5px;
  padding:8px 13px;border-radius:99px;font-family:inherit;cursor:pointer}
.chip .dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
#locBtn{top:14px;left:14px}
#gpsBadge{top:14px;right:14px;color:#C6CCD6;font-size:11px;cursor:default}
#gpsBadge.ok{color:var(--good)}
#carBox{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:min(94vw,480px);cursor:pointer}
#carBox.shake{animation:shk .45s}
@keyframes shk{0%,100%{transform:translateX(-50%)}22%{transform:translateX(calc(-50% - 5px))}66%{transform:translateX(calc(-50% + 5px))}}
#carBox svg{width:100%;height:auto;display:none}
#carBox svg.active{display:block}
.stage-cap{position:absolute;left:0;right:0;bottom:50px;text-align:center;font-size:12px;
  letter-spacing:.12em;color:rgba(20,24,32,.72);font-weight:500;transition:opacity .4s}
.sky.theme-bad .stage-cap{color:rgba(245,246,248,.85)}

/* 차종 셀렉터 */
.selector{position:relative;z-index:8;display:flex;gap:4px;width:fit-content;margin:-21px auto 0;
  background:rgba(18,19,24,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);border-radius:99px;padding:4px}
.selector button{border:none;background:transparent;color:var(--sub);font-family:inherit;
  font-size:12.5px;padding:8px 16px;border-radius:99px;cursor:pointer;transition:all .25s;white-space:nowrap}
.selector button.on{background:rgba(255,255,255,.12);color:var(--ink)}

/* ================= DASH ================= */
.dash{flex:1;padding:30px 18px calc(32px + env(safe-area-inset-bottom))}
.eyebrow{text-align:center;font-size:10.5px;letter-spacing:.32em;color:var(--gold);margin-bottom:12px;font-weight:500}
.verdict{text-align:center}
.verdict h1{font-size:26px;font-weight:600;letter-spacing:-.01em;line-height:1.35}
.verdict h1.v-good{color:var(--good)}
.verdict h1.v-warn{color:var(--warn)}
.verdict h1.v-bad{color:var(--bad)}
.verdict p{color:var(--sub);font-size:13.5px;margin-top:8px;font-weight:300}
.updated{text-align:center;color:var(--faint);font-size:11px;margin:12px 0 24px;font-weight:300}

.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.alert{display:flex;gap:11px;align-items:flex-start;padding:13px 15px;font-size:13px;line-height:1.6;
  background:var(--glass);border:1px solid var(--glass-b);border-radius:14px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#D5D9E0;font-weight:300}
.alert .ic{font-size:15px;line-height:1.5}
.alert.a-bad{border-color:rgba(224,138,128,.3)}
.alert.a-warn{border-color:rgba(232,193,119,.28)}
.alert.a-good{border-color:rgba(123,216,168,.28)}

.gauges{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:26px}
.g{background:var(--glass);border:1px solid var(--glass-b);border-radius:14px;padding:13px 8px;text-align:center;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.g .lb{font-size:10px;color:var(--sub);margin-bottom:7px;letter-spacing:.08em;font-weight:500}
.g .vl{font-size:18px;font-weight:200;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.g .st{font-size:11px;margin-top:5px;font-weight:400}
.st.ok{color:var(--good)}.st.mid{color:var(--warn)}.st.ng{color:var(--bad)}

.sec-t{font-size:10.5px;color:var(--sub);letter-spacing:.28em;margin-bottom:12px;font-weight:500}
.sec-t::before{content:"— ";color:var(--gold)}
.timeline{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:10px;scrollbar-width:none}
.timeline::-webkit-scrollbar{display:none}
.hr{flex:0 0 47px;background:var(--glass);border:1px solid var(--glass-b);border-radius:12px;padding:9px 4px;text-align:center;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.hr.now{border-color:rgba(201,169,106,.55)}
.hr .h{font-size:10px;color:var(--sub);font-weight:300}
.hr .e{font-size:14px;margin:4px 0}
.hr .d{width:5px;height:5px;border-radius:50%;margin:3px auto 0}
.d.ok{background:var(--good)}.d.mid{background:var(--warn)}.d.ng{background:var(--bad)}
.legend{display:flex;gap:18px;justify-content:center;font-size:11px;color:var(--sub);font-weight:300}
.legend i{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

.state{padding:56px 20px;text-align:center;color:var(--sub);font-size:14px;line-height:1.9;font-weight:300}
.state button,.citybtns button{margin-top:14px;background:var(--glass);border:1px solid var(--glass-b);
  color:var(--ink);font-family:inherit;font-size:13px;padding:10px 20px;border-radius:99px;cursor:pointer;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.citybtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pl 1.2s ease infinite}
@keyframes pl{50%{opacity:.2}}
.foot{text-align:center;color:var(--faint);font-size:10.5px;margin-top:20px;line-height:1.8;font-weight:300;letter-spacing:.04em}

/* ================= 차량 공통 & 기믹 ================= */
.mv{transition:transform 1s cubic-bezier(.6,0,.28,1),opacity .7s ease}
svg .win{transition:transform .8s cubic-bezier(.5,0,.4,1),opacity .8s}
@media (prefers-reduced-motion: reduce){.mv,svg .win,.cl,.streak{transition:none;animation:none}}

/* ---- 소프트탑 시퀀스 ---- */
#carSoft .segF{transform-box:fill-box;transform-origin:100% 100%}
#carSoft .stack{opacity:0;transform:translateY(-10px)}
#carSoft .tonneau{opacity:0}
#carSoft .latchdot{opacity:0}
#carSoft.s-w1 .win{transform:translateY(9px)}
#carSoft.s-w2 .win{transform:translateY(17px);opacity:.12}
#carSoft.s-latch .segF{transform:translateY(-3px) rotate(-6deg)}
#carSoft.s-latch .latchdot{opacity:1;animation:lp .5s ease 2}
@keyframes lp{50%{opacity:.15}}
#carSoft.s-f1 .segF{transform:rotate(-126deg)}
#carSoft.s-f2 .segGrp{opacity:0}
#carSoft.s-f2 .stack{opacity:1;transform:none}
#carSoft.s-stow .stack{transform:translateY(8px) scale(.9)}
#carSoft.s-ton .stack{opacity:0}
#carSoft.s-ton .tonneau{opacity:1}

/* ---- 하드탑(RHT) 시퀀스 ---- */
#carRht .trunkLid{transform-box:fill-box;transform-origin:96% 60%}
#carRht .rearGls{transform-box:fill-box;transform-origin:0% 100%}
#carRht .trunkStack{opacity:0}
#carRht.s-w1 .win{transform:translateY(9px)}
#carRht.s-w2 .win{transform:translateY(17px);opacity:.12}
#carRht.s-deck .trunkLid{transform:rotate(-44deg)}
#carRht.s-unlock .rearGls{transform:rotate(16deg)}
#carRht.s-unlock .roofPnl{transform:translateY(-3px)}
#carRht.s-slide .roofGrp{transform:translate(58px,28px) rotate(11deg) scale(.8);opacity:0}
#carRht.s-slide .trunkStack{opacity:1}
#carRht.s-close .trunkLid{transform:rotate(0)}
#carRht.s-close .trunkStack{opacity:0}

/* ---- 타르가 시퀀스 ---- */
#carTarga .canopy{transform-box:fill-box;transform-origin:80% 100%}
#carTarga .tpanel{transform-box:fill-box;transform-origin:50% 50%}
#carTarga.s-w1 .win{transform:translateY(8px)}
#carTarga.s-w2 .win{transform:translateY(15px);opacity:.12}
#carTarga.s-lift .canopy{transform:translate(5px,-26px) rotate(6deg)}
#carTarga.s-unlock .tpanel{transform:translateY(-5px) rotate(-5deg)}
#carTarga.s-slide .tpanel{transform:translate(64px,14px) scale(.85);opacity:0}
#carTarga.s-close .canopy{transform:none}

/* 공통: 잠금/샤인 */
svg .lockChip{opacity:0;transition:opacity .5s}
svg.s-lock .lockChip{opacity:1}
svg.s-lock .lockGlyph{animation:lockPulse 1s ease 3}
@keyframes lockPulse{50%{opacity:.35}}
svg .shine{opacity:0}
svg.s-done .shine{opacity:1;animation:sweep 1.4s ease forwards}
@keyframes sweep{from{transform:translateX(-160px)}to{transform:translateX(360px)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="sky" id="sky">
    <div class="sunGlow"></div>
    <div class="rain" id="rain"></div>
    <button class="chip" id="locBtn"><span class="dot"></span><span id="locName">위치 확인 중…</span></button>
    <div class="chip" id="gpsBadge">GPS…</div>

    <div id="carBox">
      <!-- ═══ 소프트탑 로드스터 (화이트 · 레드탑) ═══ -->
      <svg id="carSoft" class="active" viewBox="0 0 360 150">
        <defs>
          <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FDFDFE"/><stop offset=".55" stop-color="#E9ECF0"/><stop offset="1" stop-color="#C6CCD5"/>
          </linearGradient>
          <linearGradient id="glassG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#C4E8F3"/><stop offset="1" stop-color="#84BFD4"/>
          </linearGradient>
          <linearGradient id="redG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#D2525C"/><stop offset="1" stop-color="#A93640"/>
          </linearGradient>
          <linearGradient id="shineG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="rgba(255,255,255,0)"/><stop offset=".5" stop-color="rgba(255,255,255,.5)"/><stop offset="1" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
        </defs>
        <ellipse cx="180" cy="133" rx="148" ry="6.5" fill="rgba(0,0,0,.32)"/>

        <!-- 디테일 -->

        <path d="M158 63 L154 107" stroke="rgba(0,0,0,.11)"/><path d="M262 62 L266 107" stroke="rgba(0,0,0,.11)"/>
        <rect x="246" y="72" width="3.5" height="14" rx="1.6" fill="#D9DEE6" stroke="rgba(0,0,0,.2)" stroke-width=".6"/>

        <circle cx="318" cy="111" r="3.4" fill="#C9CFD8"/><circle cx="328" cy="111" r="3.4" fill="#C9CFD8"/>
        <!-- 소프트탑 (레드 · 3세그먼트) -->
        <g class="segGrp mv">
          <path class="segF mv" d="M176 38 Q192 28 209 27 L210 39 Q193 40 181 45 Z" fill="url(#redG)" stroke="rgba(0,0,0,.2)" stroke-width=".6"/>
          <path d="M209 27 Q229 27 243 35 L239 47 Q225 40 210 39 Z" fill="url(#redG)" stroke="rgba(0,0,0,.2)" stroke-width=".6"/>
          <path d="M243 35 Q261 45 271 61 L258 62 Q252 52 239 47 Z" fill="url(#redG)" stroke="rgba(0,0,0,.2)" stroke-width=".6"/>
          <path d="M244 40 Q256 48 261 57 L253 58 Q248 50 241 45 Z" fill="url(#glassG)" opacity=".85"/>
          <path d="M226 28 L223 44" stroke="rgba(0,0,0,.18)"/>
        </g>
        <circle class="latchdot" cx="178" cy="34" r="4" fill="#FFE9A8"/>
        <!-- 폴드 스택 / 토노 -->
        <g class="stack mv">
          <rect x="234" y="45" width="36" height="5" rx="2.5" fill="#A93640"/>
          <rect x="238" y="50" width="32" height="5" rx="2.5" fill="#BE434D"/>

        <rect class="tonneau mv" x="232" y="55" width="48" height="7" rx="3.5" fill="url(#bodyG)" stroke="rgba(0,0,0,.16)" stroke-width=".7"/>
        <!-- 휠 -->
        <g class="whl" data-x="98"></g><g class="whl" data-x="272"></g>

        <g class="lockChip">
          <rect x="166" y="4" width="28" height="18" rx="9" fill="rgba(12,13,16,.78)"/>

        <rect class="shine" x="-40" y="20" width="70" height="100" fill="url(#shineG)" transform="skewX(-18)"/>
      </svg>

      <!-- ═══ 리트랙터블 하드탑 ═══ -->
      <svg id="carRht" viewBox="0 0 360 150">
        <ellipse cx="180" cy="133" rx="148" ry="6.5" fill="rgba(0,0,0,.32)"/>
        <rect x="188" y="44" width="11" height="17" rx="4" fill="#262A34"/>
        <rect x="212" y="44" width="11" height="17" rx="4" fill="#262A34"/>
        <path class="win" d="M176 42 L228 42 L231 58 L174 58 Z" fill="url(#glassG)" opacity=".9"/>
        <path d="M28 96 C26 86 34 80 48 77 L64 74 C98 67 128 63 142 62 L154 61 L240 61 C274 60 304 64 320 72 C332 78 338 85 338 93 L336 103 C335 108 330 110 322 110 L303 110 A28 28 0 0 0 245 110 L125 110 A28 28 0 0 0 67 110 L40 110 C30 110 27 104 28 96 Z"
          fill="url(#bodyG)" stroke="rgba(18,20,26,.28)" stroke-width="1"/>
        <path d="M40 103 C120 107 260 107 330 101 L329 107 L42 107 Z" fill="rgba(0,0,0,.10)"/>
        <path d="M158 61 L250 61 L254 67 L162 67 Z" fill="#1F222B"/>
        <path d="M142 63 L166 34 L173 36 L150 64 Z" fill="#1A1D24"/>
        <path d="M148 61 L168 37 L171 38 L153 62 Z" fill="url(#glassG)" opacity=".95"/>
        <rect x="26" y="95" width="20" height="9" rx="3" fill="#1A1D24" opacity=".85"/>
        <path d="M38 76 C52 72 64 71 72 71 L72 76 C60 76 48 78 40 80 Z" fill="#F4E7C4" stroke="rgba(0,0,0,.14)"/>
        <path d="M150 64 L146 107" stroke="rgba(0,0,0,.11)"/><path d="M240 63 L244 107" stroke="rgba(0,0,0,.11)"/>
        <rect x="226" y="73" width="3.5" height="14" rx="1.6" fill="#D9DEE6" stroke="rgba(0,0,0,.2)" stroke-width=".6"/>
        <path d="M142 58 l-7 -3 l0 5 l7 1 Z" fill="#E9ECF0" stroke="rgba(0,0,0,.18)" stroke-width=".6"/>
        <rect x="329" y="76" width="9" height="8" rx="2" fill="#D8453C"/>
        <circle cx="318" cy="111" r="3.4" fill="#C9CFD8"/><circle cx="328" cy="111" r="3.4" fill="#C9CFD8"/>
        <!-- 트렁크 수납 스택 (숨김) -->
        <g class="trunkStack mv">
          <rect x="272" y="66" width="42" height="5" rx="2.5" fill="#B9BFC9"/>
          <rect x="276" y="71" width="36" height="4" rx="2" fill="#CDD3DB"/>
        </g>
        <!-- 하드 루프 (바디 컬러) -->
        <g class="roofGrp mv">
          <path class="roofPnl mv" d="M170 34 Q200 24 226 28 L226 40 Q200 36 172 40 Z" fill="url(#bodyG)" stroke="rgba(18,20,26,.3)" stroke-width=".8"/>
          <path class="rearGls mv" d="M226 28 Q248 34 262 48 L256 56 Q244 44 226 40 Z" fill="url(#glassG)" stroke="rgba(18,20,26,.3)" stroke-width=".8"/>

        <!-- 데크 리드 (리버스 힌지) -->

        <g class="whl" data-x="96"></g><g class="whl" data-x="274"></g>
        <g class="lockChip">
          <rect x="166" y="4" width="28" height="18" rx="9" fill="rgba(12,13,16,.78)"/>
          <g class="lockGlyph"><rect x="176" y="12" width="8" height="6" rx="1.4" fill="#E08A80"/>
          <path d="M177.5 12 v-2.4 a2.5 2.5 0 0 1 5 0 V12" stroke="#E08A80" stroke-width="1.6" fill="none"/></g>
        </g>
        <rect class="shine" x="-40" y="20" width="70" height="100" fill="url(#shineG)" transform="skewX(-18)"/>
      </svg>

      <!-- ═══ 타르가 ═══ -->

<script>
const $=id=>document.getElementById(id);
const CITIES=[["서울",37.5665,126.9780],["부산",35.1796,129.0756],["대구",35.8714,128.6014],["인천",37.4563,126.7052],["광주",35.1595,126.8526],["대전",36.3504,127.3845],["제주",33.4996,126.5312]];
let verdictLevel=null, animTimer=null, model='soft';

/* 휠 렌더 (공통 컴포넌트) */
document.querySelectorAll('.whl').forEach(g=>{
  const x=+g.dataset.x;
  let spokes='';
  for(let i=0;i<5;i++) spokes+=`<line x1="0" y1="0" x2="0" y2="-13" stroke="#8E96A4" stroke-width="3" transform="rotate(${i*72})"/>`;
  g.innerHTML=`<g transform="translate(${x},110)">
    <circle r="24" fill="#17191F"/>
    <circle r="16" fill="#D7DCE4"/>
    <g>${spokes}</g>
    <circle r="4.5" fill="#C63B44"/><circle r="16" fill="none" stroke="#9AA1AF" stroke-width="1.5"/>
  </g>`;
});

/* ================= 차종별 오픈 기믹 시퀀스 ================= */
const SVGS={soft:$('carSoft'),rht:$('carRht'),targa:$('carTarga')};
const SEQS={
  soft:[
    {c:'s-w1',cap:'사이드 윈도우 다운',d:520},
    {c:'s-w2',cap:'사이드 윈도우 다운',d:520},
    {c:'s-latch',cap:'프론트 래치 해제',d:720},
    {c:'s-f1',cap:'프론트 보우 폴딩',d:980},
    {c:'s-f2',cap:'Z-폴드 진행',d:820},
    {c:'s-stow',cap:'탑 웰 수납',d:760},
    {c:'s-ton',cap:'토노 커버 클로즈',d:820},
    {c:'s-done',cap:'오픈에어링 준비 완료',d:0},
  ],
  rht:[
    {c:'s-w1',cap:'사이드 윈도우 다운',d:520},
    {c:'s-w2',cap:'사이드 윈도우 다운',d:520},
    {c:'s-deck',cap:'데크 리드 리버스 오픈',d:1050},
    {c:'s-unlock',cap:'루프 언록 · 리어 글라스 틸트',d:820},
    {c:'s-slide',cap:'루프 패널 트렁크 수납',d:1050},
    {c:'s-close',cap:'데크 리드 클로즈',d:980},
    {c:'s-done',cap:'오픈에어링 준비 완료',d:0},
  ],
  targa:[
    {c:'s-w1',cap:'사이드 윈도우 다운',d:520},
    {c:'s-w2',cap:'사이드 윈도우 다운',d:520},
    {c:'s-lift',cap:'리어 캐노피 리프트',d:1050},
    {c:'s-unlock',cap:'타르가 패널 언록',d:760},
    {c:'s-slide',cap:'패널 후방 수납',d:980},
    {c:'s-close',cap:'캐노피 클로즈',d:1000},
    {c:'s-done',cap:'타르가 오픈 완료',d:0},
  ],
};
function resetCar(){
  clearTimeout(animTimer);
  Object.values(SVGS).forEach(s=>s.className.baseVal=s.classList.contains('active')?'active':'');
  $('stageCap').textContent='';
}
function playOpen(){
  resetCar();
  const svg=SVGS[model], seq=SEQS[model];
  let i=0;
  (function step(){
    const f=seq[i];
    svg.classList.add(f.c);
    $('stageCap').textContent=f.cap;
    if(++i<seq.length) animTimer=setTimeout(step,f.d);
    else setTimeout(()=>$('stageCap').textContent='',3000);
  })();
}
function playLocked(){
  resetCar();
  SVGS[model].classList.add('s-lock');
  $('stageCap').textContent='탑 록 유지 — 오늘은 쉬는 날';
}
$('carBox').addEventListener('click',()=>{
  if(verdictLevel==='bad'){
    const b=$('carBox');b.classList.remove('shake');void b.offsetWidth;b.classList.add('shake');
    playLocked();return;
  }
  if(verdictLevel) playOpen();
});
/* 차종 셀렉터 */
$('selector').addEventListener('click',e=>{
  const btn=e.target.closest('button');if(!btn)return;
  document.querySelectorAll('#selector button').forEach(b=>b.classList.toggle('on',b===btn));
  model=btn.dataset.m;
  Object.entries(SVGS).forEach(([k,s])=>s.classList.toggle('active',k===model));
  resetCar();
  if(verdictLevel==='bad') playLocked();
  else if(verdictLevel) setTimeout(playOpen,250);
});

/* 구름/비 */
(function(){
  const r=$('rain');
  for(let i=0;i<26;i++){const d=document.createElement('div');d.className='streak';
    d.style.left=(Math.random()*100)+'%';d.style.animationDelay=(Math.random()*0.75)+'s';
    d.style.animationDuration=(0.55+Math.random()*0.45)+'s';r.appendChild(d);}
  const sky=$('sky');
  [[40,52,110,26,40],[200,96,150,32,58],[-60,140,120,24,74]].forEach(([l,t,w,h,dur])=>{
    const c=document.createElement('div');c.className='cl';
    c.style.cssText=`left:${l}px;top:${t}px;width:${w}px;height:${h}px;animation-duration:${dur}s`;
    sky.appendChild(c);});
})();

/* ================= 위치 ================= */
function start(){
  $('gpsBadge').textContent='GPS…';$('gpsBadge').classList.remove('ok');
  if(!navigator.geolocation){showCityPick();return;}
  navigator.geolocation.getCurrentPosition(
    p=>{
      const acc=Math.round(p.coords.accuracy);
      $('gpsBadge').textContent='±'+(acc>=1000?(acc/1000).toFixed(1)+'km':acc+'m');
      $('gpsBadge').classList.add('ok');
      load(p.coords.latitude,p.coords.longitude,null);
    },
    ()=>showCityPick(),
    {enableHighAccuracy:true,timeout:15000,maximumAge:120000}
  );
}
function showCityPick(){
  $('stLoading').style.display='none';$('stDenied').style.display='block';
  $('gpsBadge').textContent='GPS 꺼짐';
  const box=$('cityBtns');box.innerHTML='';
  CITIES.forEach(([n,la,lo])=>{const b=document.createElement('button');b.textContent=n;
    b.onclick=()=>{$('stDenied').style.display='none';$('stLoading').style.display='block';load(la,lo,n);};
    box.appendChild(b);});
  $('locName').textContent='위치 미확인';
}
$('retryGeo').onclick=()=>{$('stDenied').style.display='none';$('stLoading').style.display='block';start();};
$('locBtn').onclick=start;

async function placeName(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`);
    const j=await r.json();
    return [j.city,j.locality].filter(Boolean).join(' ')||'내 위치';
  }catch(e){return '내 위치';}
}

/* ================= 날씨 (KMA) ================= */
async function fetchWeather(lat,lon,useKma){
  const model=useKma?'&models=kma_seamless':'';
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index,precipitation`+
    `&hourly=precipitation_probability,weather_code&timezone=auto&forecast_days=1&cell_selection=nearest${model}`;
  const r=await fetch(url);
  if(!r.ok) throw 0;
  const j=await r.json();
  if(!j.current||j.current.temperature_2m==null) throw 0;
  return j;
}
async function load(lat,lon,cityName){
  try{
    let w;
    try{ w=await fetchWeather(lat,lon,true); }
    catch(e){ w=await fetchWeather(lat,lon,false); }
    const ar=await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm10,pm2_5&timezone=auto&cell_selection=nearest`);
    const a=await ar.json();
    $('locName').textContent=cityName||await placeName(lat,lon);
    render(w,a);
  }catch(e){
    $('stLoading').style.display='none';$('stError').style.display='block';
  }
}

const isRainCode=c=>(c>=51&&c<=67)||(c>=71&&c<=77)||(c>=80&&c<=86)||(c>=95);
function pmGrade25(v){return v<=15?0:v<=35?1:v<=75?2:3}
function pmGrade10(v){return v<=30?0:v<=80?1:v<=150?2:3}
const PM_TXT=['좋음','보통','나쁨','매우나쁨'];

function render(w,a){
  const cur=w.current, air=a.current;
  const now=new Date(cur.time), nowH=now.getHours();
  const hh=w.hourly.time.map(t=>new Date(t).getHours());
  let maxProb=0, rainSoonH=null;
  w.hourly.time.forEach((t,i)=>{
    const h=hh[i];
    if(h>=nowH&&h<=Math.min(nowH+8,23)){
      const p=w.hourly.precipitation_probability[i]??0;
      if(p>maxProb)maxProb=p;
      if(rainSoonH===null&&isRainCode(w.hourly.weather_code[i]))rainSoonH=h;
    }
  });
  const g25=pmGrade25(air.pm2_5), g10=pmGrade10(air.pm10), pmWorst=Math.max(g25,g10);
  const wind=cur.wind_speed_10m, temp=cur.temperature_2m, feel=cur.apparent_temperature, uv=cur.uv_index??0;
  const rainingNow=isRainCode(cur.weather_code)||cur.precipitation>0;

  const bads=[],warns=[],goods=[];
  if(rainingNow) bads.push(['🌧','지금 비가 내리고 있어요. 탑은 그대로 두세요.']);
  else if(maxProb>=60) bads.push(['🌧',`강수확률 최대 ${maxProb}%. ${rainSoonH?rainSoonH+'시경 비 가능성 — ':''}오픈에어링은 다음 기회에.`]);
  else if(maxProb>=30) warns.push(['☔',`강수확률 ${maxProb}% — 짧은 코스 위주, 하늘이 어두워지면 바로 클로즈.`]);
  if(pmWorst>=3) bads.push(['😷',`미세먼지 매우나쁨 (PM2.5 ${Math.round(air.pm2_5)}·PM10 ${Math.round(air.pm10)}). 오픈 시 호흡기 직접 노출.`]);
  else if(pmWorst===2) warns.push(['😷','미세먼지 나쁨 — 장거리 오픈은 피하고 정체 구간에선 클로즈 권장.']);
  if(wind>=40) bads.push(['💨',`강풍 ${Math.round(wind)}km/h — 고속 버피팅 위험.`]);
  else if(wind>=25) warns.push(['💨',`바람 다소 강함 (${Math.round(wind)}km/h). 윈드 디플렉터와 창문 업 추천.`]);
  if(feel<=0) bads.push(['🥶',`체감 ${Math.round(feel)}°C — 오픈 주행엔 너무 추워요.`]);
  else if(feel<8) warns.push(['🧣',`체감 ${Math.round(feel)}°C 쌀쌀 — 시트히터와 목토시가 있다면 충분해요.`]);
  if(uv>=8) warns.push(['🕶','자외선 매우 강함 — 썬크림·선글라스·모자 없이는 짧은 주행도 무리예요.']);
  else if(uv>=6) warns.push(['☀','햇빛이 강한 날 — 썬크림 바르고 출발하세요.']);
  if(temp>=33) warns.push(['🥵',`기온 ${Math.round(temp)}°C — 오픈 시 에어컨 무력화. 정체 구간 열사병 주의, 물을 챙기세요.`]);
  else if(temp>=30) warns.push(['🌡',`기온 ${Math.round(temp)}°C — 한낮보다는 아침·저녁의 오픈에어링을 추천해요.`]);

  let level;
  if(bads.length)level='bad';
  else if(warns.length)level='warn';
  else{level='good';goods.push(['🏁','비·미세먼지·바람 모두 완벽. 하늘이 허락한 하루입니다.']);}
  verdictLevel=level;

  const sky=$('sky');
  sky.classList.remove('theme-warn','theme-bad');
  if(level==='warn')sky.classList.add('theme-warn');
  if(level==='bad')sky.classList.add('theme-bad');
  $('rain').classList.toggle('on',rainingNow);

  const V={good:['오픈에어링하기 좋은 날','하늘이 허락한 드라이브'],
           warn:['오픈에어링 할 수 있는 날','몇 가지만 챙기면 충분해요'],
           bad:['오픈에어링 쉬는 날','오늘은 탑을 아껴 두세요']}[level];
  $('vTitle').textContent=V[0];$('vTitle').className='v-'+level;
  $('vSub').textContent=V[1];
  $('vTime').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})
    +' '+String(nowH).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' 기준 · KMA 모델';

  const al=$('alerts');al.innerHTML='';
  [...bads.map(x=>['a-bad',...x]),...warns.map(x=>['a-warn',...x]),...goods.map(x=>['a-good',...x])]
    .forEach(([cl,ic,tx])=>{const d=document.createElement('div');d.className='alert '+cl;
      d.innerHTML=`<span class="ic">${ic}</span><span>${tx}</span>`;al.appendChild(d);});

  setG('gTemp',`${Math.round(temp)}° / ${Math.round(feel)}°`, temp>=33||feel<=0?'ng':temp>=30||feel<8?'mid':'ok', temp>=30?'더움':feel<8?'쌀쌀':'적당');
  setG('gUv',(+uv).toFixed(1), uv>=8?'ng':uv>=6?'mid':'ok', uv>=8?'매우강함':uv>=6?'강함':uv>=3?'보통':'낮음');
  setG('gPm25',Math.round(air.pm2_5), g25>=2?'ng':g25===1?'mid':'ok', PM_TXT[g25]);
  setG('gPm10',Math.round(air.pm10), g10>=2?'ng':g10===1?'mid':'ok', PM_TXT[g10]);
  setG('gRain',maxProb+'%', maxProb>=60?'ng':maxProb>=30?'mid':'ok', maxProb>=60?'비 옴':maxProb>=30?'가능성':'맑음');
  setG('gWind',Math.round(wind)+'㎞', wind>=40?'ng':wind>=25?'mid':'ok', wind>=40?'강풍':wind>=25?'다소강함':'양호');

  const tl=$('timeline');tl.innerHTML='';
  const EMO=c=>isRainCode(c)?'🌧':c<=1?'☀':c===2?'⛅':'☁';
  w.hourly.time.forEach((t,i)=>{
    const h=hh[i];if(h<6||h>22)return;
    const prob=w.hourly.precipitation_probability[i]??0, code=w.hourly.weather_code[i];
    let s='ok';
    if(isRainCode(code)||prob>=60||pmWorst>=3)s='ng';
    else if(prob>=30||pmWorst===2)s='mid';
    const div=document.createElement('div');div.className='hr'+(h===nowH?' now':'');
    div.innerHTML=`<div class="h">${h}시</div><div class="e">${EMO(code)}</div><div class="d ${s}"></div>`;
    tl.appendChild(div);
  });

  $('stLoading').style.display='none';$('stError').style.display='none';
  $('result').style.display='block';

  setTimeout(()=>{ level==='bad'?playLocked():playOpen(); },600);
  const nowEl=tl.querySelector('.hr.now');
  if(nowEl)nowEl.scrollIntoView({inline:'center',block:'nearest'});
}
function setG(id,val,cls,txt){$(id).textContent=val;const s=$(id+'S');s.textContent=txt;s.className='st '+cls;}
start();
</script>
