<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>OPEN-AIR — 오픈에어링 판정</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="오픈에어">
<meta name="theme-color" content="#0B0C10">
<link rel="manifest" href='data:application/manifest+json,{"name":"오픈에어링 판정","short_name":"오픈에어","display":"standalone","background_color":"%230B0C10","theme_color":"%230B0C10","start_url":"."}'>
<style>
:root{
  --bg:#0B0C10; --ink:#F5F6F8; --sub:#9AA0AC; --faint:#5B616D;
  --good:#7BD8A8; --warn:#E8C177; --bad:#E08A80; --gold:#C9A96A;
  --spring:cubic-bezier(.34,1.25,.4,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.glass{position:relative;background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.13);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 10px 32px rgba(0,0,0,.32);
  backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%)}

.sky{position:relative;height:368px;overflow:hidden;
  background:linear-gradient(180deg,#7DB8DE 0%,#A9CFE8 42%,#E9E2D2 78%,#F3E3C2 100%);transition:background 1.2s ease}
.sky.theme-warn{background:linear-gradient(180deg,#C0A26C 0%,#D9C298 42%,#EEDFC2 78%,#F6EDD8 100%)}
.sky.theme-bad{background:linear-gradient(180deg,#535E6A 0%,#75818E 42%,#9AA6B0 78%,#B9C3CB 100%)}
.sunGlow{position:absolute;top:-46px;right:-14px;width:230px;height:230px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,236,190,.95) 0%,rgba(255,225,160,.35) 42%,transparent 70%);
  filter:blur(2px);transition:opacity 1s}
.sky.theme-bad .sunGlow{opacity:.1}
.cl{position:absolute;background:rgba(255,255,255,.5);border-radius:999px;filter:blur(11px);animation:drift linear infinite}
.sky.theme-bad .cl{background:rgba(235,240,244,.48)}
@keyframes drift{from{transform:translateX(-240px)}to{transform:translateX(700px)}}
.rain{position:absolute;inset:0;display:none;pointer-events:none}
.sky.theme-bad .rain.on{display:block}
.streak{position:absolute;top:-30px;width:1.5px;height:22px;border-radius:1px;
  background:linear-gradient(180deg,transparent,rgba(90,110,130,.55));animation:fall .75s linear infinite}
@keyframes fall{to{transform:translateY(420px)}}
.road{position:absolute;left:0;right:0;bottom:0;height:40px;background:#15161B}
.road::before{content:"";position:absolute;top:17px;left:0;right:0;height:2px;
  background:repeating-linear-gradient(90deg,rgba(201,169,106,.5) 0 26px,transparent 26px 64px)}
.chip{position:absolute;z-index:6;display:flex;align-items:center;gap:7px;border-radius:99px;
  color:#fff;font-size:12.5px;padding:8px 13px;font-family:inherit;cursor:pointer;
  background:rgba(14,15,20,.4);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.16);box-shadow:inset 0 1px 0 rgba(255,255,255,.14)}
.chip .dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
#locBtn{top:14px;left:14px}
#gpsBadge{top:14px;right:14px;color:#C6CCD6;font-size:11px;cursor:default}
#gpsBadge.ok{color:var(--good)}
#carBox{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:min(97vw,520px);cursor:pointer}
#carBox.shake{animation:shk .45s}
@keyframes shk{0%,100%{transform:translateX(-50%)}22%{transform:translateX(calc(-50% - 5px))}66%{transform:translateX(calc(-50% + 5px))}}
#carBox svg{width:100%;height:auto;display:none}
#carBox svg.active{display:block}
.cap-pill{position:absolute;left:50%;top:64px;transform:translateX(-50%);z-index:7;
  display:none;align-items:center;gap:10px;padding:9px 15px 12px;border-radius:99px;min-width:220px;
  background:rgba(12,13,17,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);box-shadow:inset 0 1px 0 rgba(255,255,255,.14)}
.cap-pill.on{display:flex}
.cap-pill .num{font-size:11px;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.08em}
.cap-pill .txt{font-size:12.5px;color:#F0F1F4;font-weight:500;white-space:nowrap}
.cap-pill .prog{position:absolute;left:16px;right:16px;bottom:5px;height:2px;border-radius:1px;background:rgba(255,255,255,.14);overflow:hidden}
.cap-pill .prog i{display:block;height:100%;width:0;background:var(--gold);transition:width .6s ease}

.selector{position:relative;z-index:8;display:flex;width:fit-content;margin:-23px auto 0;border-radius:99px;padding:4px;gap:2px}
.selector .thumb{position:absolute;top:4px;left:0;height:calc(100% - 8px);border-radius:99px;
  background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.08));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25);transition:transform .5s var(--spring),width .5s var(--spring)}
.selector button{position:relative;z-index:1;border:none;background:transparent;color:var(--sub);
  font-family:inherit;font-size:12px;padding:9px 13px;border-radius:99px;cursor:pointer;transition:color .3s;white-space:nowrap;font-weight:500}
.selector button.on{color:var(--ink)}
.mech-tag{text-align:center;font-size:10.5px;color:var(--faint);letter-spacing:.1em;margin-top:10px}

.dash{flex:1;padding:26px 18px calc(32px + env(safe-area-inset-bottom))}
.reveal{animation:up .7s var(--spring) both}
@keyframes up{from{opacity:0;transform:translateY(14px)}}
.eyebrow{text-align:center;font-size:10.5px;letter-spacing:.34em;color:var(--gold);margin-bottom:12px;font-weight:500}
.verdict{text-align:center}
.verdict h1{font-size:28px;font-weight:650;letter-spacing:-.02em;line-height:1.3}
.verdict h1.v-good{color:var(--good)}
.verdict h1.v-warn{color:var(--warn)}
.verdict h1.v-bad{color:var(--bad)}
.verdict p{color:var(--sub);font-size:13.5px;margin-top:8px;font-weight:300}
.updated{text-align:center;color:var(--faint);font-size:11px;margin:12px 0 24px;font-weight:300}
.alerts{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.alert{display:flex;gap:11px;align-items:flex-start;padding:14px 16px;font-size:13px;line-height:1.6;border-radius:20px;color:#D5D9E0;font-weight:300}
.alert .ic{font-size:15px;line-height:1.5}
.alert.a-bad{border-color:rgba(224,138,128,.32)}
.alert.a-warn{border-color:rgba(232,193,119,.3)}
.alert.a-good{border-color:rgba(123,216,168,.3)}
.gauges{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:26px}
.g{border-radius:20px;padding:14px 8px;text-align:center}
.g .lb{font-size:10px;color:var(--sub);margin-bottom:7px;letter-spacing:.08em;font-weight:500}
.g .vl{font-size:18px;font-weight:250;font-variant-numeric:tabular-nums}
.g .st{font-size:11px;margin-top:5px}
.st.ok{color:var(--good)}.st.mid{color:var(--warn)}.st.ng{color:var(--bad)}
.sec-t{font-size:10.5px;color:var(--sub);letter-spacing:.28em;margin-bottom:12px;font-weight:500}
.sec-t::before{content:"— ";color:var(--gold)}
.timeline{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:10px;scrollbar-width:none}
.timeline::-webkit-scrollbar{display:none}
.hr{flex:0 0 48px;border-radius:16px;padding:10px 4px;text-align:center}
.hr.now{border-color:rgba(201,169,106,.55)}
.hr .h{font-size:10px;color:var(--sub);font-weight:300}
.hr .e{font-size:14px;margin:4px 0}
.hr .d{width:5px;height:5px;border-radius:50%;margin:3px auto 0}
.d.ok{background:var(--good)}.d.mid{background:var(--warn)}.d.ng{background:var(--bad)}
.legend{display:flex;gap:18px;justify-content:center;font-size:11px;color:var(--sub);font-weight:300}
.legend i{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.state{padding:56px 20px;text-align:center;color:var(--sub);font-size:14px;line-height:1.9;font-weight:300}
.state button,.citybtns button{margin-top:14px;color:var(--ink);font-family:inherit;font-size:13px;padding:10px 20px;border-radius:99px;cursor:pointer}
.citybtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pl 1.2s ease infinite}
@keyframes pl{50%{opacity:.2}}
.foot{text-align:center;color:var(--faint);font-size:10.5px;margin-top:20px;line-height:1.8;font-weight:300;letter-spacing:.04em}

/* ═══ 기믹 공통 ═══ */
.mvS{transition:transform .85s cubic-bezier(.5,0,.2,1),opacity .6s}
.mvM{transition:transform 1.15s cubic-bezier(.55,0,.18,1),opacity .8s}
.mvH{transition:transform 1.55s cubic-bezier(.6,.02,.12,1),opacity .9s}
svg .win{transition:transform .9s cubic-bezier(.5,0,.4,1),opacity .9s}
svg .lockChip{opacity:0;transition:opacity .5s}
svg.s-lock .lockChip{opacity:1}
svg.s-lock .lockGlyph{animation:lockPulse 1s ease 3}
@keyframes lockPulse{50%{opacity:.35}}
svg .shine{opacity:0}
svg.s-done .shine{opacity:1;animation:sweep 1.6s ease forwards}
@keyframes sweep{from{transform:translateX(-220px) skewX(-18deg)}to{transform:translateX(620px) skewX(-18deg)}}
svg.settle{animation:settle 1s ease}
@keyframes settle{0%,100%{transform:none}42%{transform:translateY(2px)}}
@media (prefers-reduced-motion: reduce){.mvS,.mvM,.mvH,svg .win,.cl,.streak{transition:none;animation:none}}

/* 350Z */
#zcar .segF{transform-box:fill-box;transform-origin:100% 100%}
#zcar .tonLid{transform-box:fill-box;transform-origin:96% 50%}
#zcar .stack{opacity:0;transform:translateY(-14px)}
#zcar .latchdot{opacity:0}
#zcar.s-w1 .win{transform:translateY(12px)}
#zcar.s-w2 .win{transform:translateY(24px);opacity:.08}
#zcar.s-latch .segF{transform:translateY(-4px) rotate(-6deg)}
#zcar.s-latch .latchdot{opacity:1;animation:lp .5s ease 2}
@keyframes lp{50%{opacity:.15}}
#zcar.s-ton .tonLid{transform:rotate(-33deg)}
#zcar.s-f1 .segF{transform:rotate(-125deg)}
#zcar.s-f2 .segGrp{opacity:0}
#zcar.s-f2 .stack{opacity:1;transform:none}
#zcar.s-tc .stack{transform:translateY(7px) scale(.96)}
#zcar.s-tc .tonLid{transform:rotate(0);transition-delay:.35s}

/* Z4 E89 */
#z4car .trunkLid{transform-box:fill-box;transform-origin:96% 60%}
#z4car .roofFront{transform-box:fill-box;transform-origin:50% 60%}
#z4car .trunkStack{opacity:0}
#z4car.s-w1 .win{transform:translateY(12px)}
#z4car.s-w2 .win{transform:translateY(23px);opacity:.08}
#z4car.s-deck .trunkLid{transform:rotate(-38deg)}
#z4car.s-lift .roofFront{transform:translate(6px,-16px) rotate(5deg)}
#z4car.s-stk .roofFront{transform:translate(46px,-6px) rotate(12deg)}
#z4car.s-drop .roofGrp{transform:translate(70px,46px) rotate(15deg) scale(.68);opacity:0}
#z4car.s-drop .trunkStack{opacity:1;transition-delay:.75s}
#z4car.s-cls .trunkLid{transform:rotate(0)}
#z4car.s-cls .trunkStack{opacity:0}

/* F33 */
#f33car .trunkLid{transform-box:fill-box;transform-origin:96% 60%}
#f33car .rp1,#f33car .rp2,#f33car .rp3{transform-box:fill-box}
#f33car .rp3{transform-origin:0% 100%}
#f33car .stack{opacity:0}
#f33car.s-w1 .win{transform:translateY(12px)}
#f33car.s-w2 .win{transform:translateY(23px);opacity:.08}
#f33car.s-deck .trunkLid{transform:rotate(-37deg)}
#f33car.s-unl .rp1{transform:translateY(-5px)}
#f33car.s-unl .rp2{transform:translateY(-3px);transition-delay:.12s}
#f33car.s-unl .rp3{transform:rotate(4deg);transition-delay:.24s}
#f33car.s-fd1 .rp1{transform:translate(44px,-10px) rotate(14deg)}
#f33car.s-fd2 .rp2{transform:translate(24px,2px) rotate(7deg)}
#f33car.s-fd2 .rp1{transform:translate(64px,-2px) rotate(18deg)}
#f33car.s-fd2 .rp3{transform:rotate(46deg)}
#f33car.s-drop .roofGrp{transform:translate(60px,50px) rotate(12deg) scale(.64);opacity:0}
#f33car.s-drop .stack{opacity:1;transition-delay:.75s}
#f33car.s-cls .trunkLid{transform:rotate(0)}
#f33car.s-cls .stack{opacity:0}

/* 911 Targa */
#p911 .canopy{transform-box:fill-box;transform-origin:86% 100%}
#p911 .roofPanel{transform-box:fill-box;transform-origin:50% 50%}
#p911 .panelStack{opacity:0}
#p911.s-w1 .win{transform:translateY(10px)}
#p911.s-w2 .win{transform:translateY(20px);opacity:.08}
#p911.s-lift .canopy{transform:translate(18px,-46px) rotate(15deg)}
#p911.s-rel .roofPanel{transform:translateY(-8px) rotate(-3deg)}
#p911.s-fold .roofPanel{transform:translate(74px,22px) rotate(-165deg) scale(.85,.6);opacity:0}
#p911.s-fold .panelStack{opacity:1;transition-delay:.78s}
#p911.s-cls .canopy{transform:none}
</style>
</head>
<body>
<div class="wrap">

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="gWhite" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FEFEFF"/><stop offset=".38" stop-color="#EDF0F4"/>
        <stop offset=".72" stop-color="#D2D8E0"/><stop offset="1" stop-color="#AEB6C2"/>
      </linearGradient>
      <linearGradient id="gRed" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#D8555F"/><stop offset=".6" stop-color="#B93B46"/><stop offset="1" stop-color="#932B35"/>
      </linearGradient>
      <linearGradient id="gGlass" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#DFF3F9"/><stop offset=".5" stop-color="#A8D6E6"/><stop offset="1" stop-color="#6FA8BF"/>
      </linearGradient>
      <linearGradient id="gSilver" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#F7F9FB"/><stop offset=".38" stop-color="#DFE4EA"/>
        <stop offset=".72" stop-color="#BFC7D1"/><stop offset="1" stop-color="#98A1AE"/>
      </linearGradient>
      <linearGradient id="gMetal" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#E4E8EE"/><stop offset="1" stop-color="#A6ADBA"/>
      </linearGradient>
      <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#4A7CC4"/><stop offset=".45" stop-color="#2F5AA0"/>
        <stop offset=".78" stop-color="#1F4076"/><stop offset="1" stop-color="#152C52"/>
      </linearGradient>
      <linearGradient id="gGrey" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#EDF0F3"/><stop offset=".4" stop-color="#CBD1D8"/>
        <stop offset=".75" stop-color="#A4ACB7"/><stop offset="1" stop-color="#7E8794"/>
      </linearGradient>
      <linearGradient id="gDark" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3A3D46"/><stop offset="1" stop-color="#1B1E25"/>
      </linearGradient>
      <linearGradient id="gLamp" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FDFBF0"/><stop offset="1" stop-color="#D8D2B4"/>
      </linearGradient>
      <linearGradient id="gTail" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#F0665C"/><stop offset="1" stop-color="#B92E28"/>
      </linearGradient>
      <linearGradient id="gShine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="rgba(255,255,255,0)"/><stop offset=".5" stop-color="rgba(255,255,255,.42)"/><stop offset="1" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <radialGradient id="gTire" cx=".38" cy=".34" r=".85">
        <stop offset="0" stop-color="#23262D"/><stop offset=".7" stop-color="#111318"/><stop offset="1" stop-color="#0A0B0E"/>
      </radialGradient>
      <linearGradient id="gRim" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#F2F4F8"/><stop offset=".5" stop-color="#C7CDD6"/><stop offset="1" stop-color="#8B93A0"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="sky" id="sky">
    <div class="sunGlow"></div>
    <div class="rain" id="rain"></div>
    <button class="chip" id="locBtn"><span class="dot"></span><span id="locName">위치 확인 중…</span></button>
    <div class="chip" id="gpsBadge">GPS…</div>
    <div class="cap-pill" id="capPill">
      <span class="num" id="capNum">01</span><span class="txt" id="capTxt"></span>
      <span class="prog"><i id="capProg"></i></span>
    </div>

    <div id="carBox">
      <!-- ═════ NISSAN 350Z ROADSTER · 화이트/레드탑 ═════ -->
      <svg id="zcar" class="active" viewBox="0 0 560 190">
        <ellipse cx="280" cy="172" rx="240" ry="7" fill="rgba(0,0,0,.34)"/>
        <!-- 콕핏(탑 아래) -->
        <path d="M246 76 L370 71 L376 80 L248 84 Z" fill="#191C23"/>
        <rect x="292" y="52" width="15" height="24" rx="5" fill="#252932"/>
        <rect x="324" y="50" width="15" height="24" rx="5" fill="#252932"/>
        <path d="M294 52 q7 -13 14 0" stroke="#D9DEE6" stroke-width="3.4" fill="none"/>
        <path d="M326 50 q7 -13 14 0" stroke="#D9DEE6" stroke-width="3.4" fill="none"/>
        <!-- 사이드 글라스 -->
        <path class="win" d="M250 54 L344 58 L351 74 L246 77 Z" fill="url(#gGlass)" opacity=".92"/>
        <!-- 보디 -->
        <path d="M40 152 C30 150 26 142 27 132 L29 118 C30 108 36 101 46 98 L64 95 C120 88 180 83 218 80 L232 79 L380 74 C412 72 436 72 458 76 C486 80 504 86 508 96 L510 112 C511 130 506 144 494 150 L469 151 A49 49 0 0 0 371 151 L199 151 A49 49 0 0 0 101 151 L52 151 C44 151 41 152 40 152 Z"
          fill="url(#gWhite)" stroke="rgba(16,18,24,.32)" stroke-width="1.2"/>
        <!-- 쇼울더 하이라이트 / 로커 셰이드 -->
        <path d="M64 93 C170 84 300 78 458 74 L458 78 C300 82 170 88 66 97 Z" fill="rgba(255,255,255,.5)"/>
        <path d="M100 149 C240 152 380 152 470 148 L470 138 C360 143 200 143 100 140 Z" fill="rgba(10,12,18,.16)"/>
        <!-- 윈드실드 -->
        <path d="M232 79 L272 40 L282 42 L246 81 Z" fill="#171A21"/>
        <path d="M240 77 L275 43 L279 44 L249 78 Z" fill="url(#gGlass)" opacity=".96"/>
        <!-- 프론트 디테일 -->
        <path d="M29 120 L44 118 L44 127 L29 128 Z" fill="#15181F" opacity=".85"/>
        <circle cx="36" cy="123" r="2" fill="#E8A24E"/>
        <path d="M62 95 C88 90 110 88 124 88 L124 93 C106 93 86 95 66 98 Z" fill="url(#gLamp)" stroke="rgba(0,0,0,.18)" stroke-width=".7"/>
        <path d="M66 96 C86 92 106 91 122 91" stroke="rgba(0,0,0,.15)" fill="none"/>
        <rect x="220" y="99" width="13" height="5" rx="2.5" fill="#15181F"/><circle cx="224" cy="101.5" r="1.6" fill="#E8A24E"/>
        <!-- 도어 컷 / 핸들 / 미러 -->
        <path d="M238 80 L232 150" stroke="rgba(10,14,20,.16)" stroke-width="1.2" fill="none"/>
        <path d="M368 75 L377 150" stroke="rgba(10,14,20,.16)" stroke-width="1.2" fill="none"/>
        <rect x="352" y="79" width="4.5" height="16" rx="2" fill="#DCE1E9" stroke="rgba(0,0,0,.22)" stroke-width=".6"/>
        <path d="M240 72 L233 65 L246 61 L252 68 Z" fill="url(#gWhite)" stroke="rgba(0,0,0,.2)" stroke-width=".7"/>
        <path d="M236 66 L244 63 L248 67 L241 70 Z" fill="#2A2E38"/>
        <!-- 리어 -->
        <path d="M480 82 L507 88 L506 100 L479 94 Z" fill="url(#gTail)" stroke="rgba(0,0,0,.2)" stroke-width=".7"/>
        <circle cx="472" cy="156" r="5" fill="#C9CFD8" stroke="rgba(0,0,0,.3)"/>
        <circle cx="457" cy="156" r="5" fill="#C9CFD8" stroke="rgba(0,0,0,.3)"/>
        <!-- 폴드 스택 → 토노 -->
        <g class="stack mvM">
          <rect x="386" y="52" width="56" height="6" rx="3" fill="#932B35"/>
          <rect x="391" y="58" width="50" height="6" rx="3" fill="#B93B46"/>

    {c:'s-deck',cap:'클램셸 데크 리버스 오픈',d:1650},

    {c:'s-unl',cap:'루프 3분할 언록',d:980},

    {c:'s-lift',cap:'리어 캐노피 스윙 업',d:1850},

function resetCar(){
  clearTimeout(animTimer);
  Object.values(SVGS).forEach(s=>{s.setAttribute('class',s.classList.contains('active')?'active':'')});
  $('capPill').classList.remove('on');
}
function playOpen(){
  resetCar();
  const svg=SVGS[model], seq=SEQS[model];
  const pill=$('capPill');pill.classList.add('on');
  let i=0;
  (function step(){
    const f=seq[i];
    svg.classList.add(f.c);
    if(f.settle){svg.classList.remove('settle');void svg.getBoundingClientRect();svg.classList.add('settle');}
    $('capNum').textContent=String(i+1).padStart(2,'0');
    $('capTxt').textContent=f.cap;
    $('capProg').style.width=Math.round(((i+1)/seq.length)*100)+'%';
    if(++i<seq.length) animTimer=setTimeout(step,f.d);
    else animTimer=setTimeout(()=>pill.classList.remove('on'),3200);
  })();
}
function playLocked(){
  resetCar();
  SVGS[model].classList.add('s-lock');
  const pill=$('capPill');pill.classList.add('on');
  $('capNum').textContent='—';
  $('capTxt').textContent='탑 록 유지 · 오늘은 쉬는 날';
  $('capProg').style.width='0%';
}
$('carBox').addEventListener('click',()=>{
  if(verdictLevel==='bad'){
    const b=$('carBox');b.classList.remove('shake');void b.offsetWidth;b.classList.add('shake');
    playLocked();return;
  }
  if(verdictLevel) playOpen();
});
function moveThumb(btn){
  const t=$('thumb');
  t.style.width=btn.offsetWidth+'px';
  t.style.transform=`translateX(${btn.offsetLeft-4}px)`;
}
$('selector').addEventListener('click',e=>{
  const btn=e.target.closest('button');if(!btn)return;
  document.querySelectorAll('#selector button').forEach(b=>b.classList.toggle('on',b===btn));
  moveThumb(btn);
  model=btn.dataset.m;
  $('mechTag').textContent=MECH[model];
  Object.entries(SVGS).forEach(([k,s])=>s.classList.toggle('active',k===model));
  resetCar();
  if(verdictLevel==='bad') playLocked();
  else if(verdictLevel) setTimeout(playOpen,280);
});
addEventListener('load',()=>moveThumb(document.querySelector('#selector button.on')));
addEventListener('resize',()=>moveThumb(document.querySelector('#selector button.on')));

(function(){
  const r=$('rain');
  for(let i=0;i<26;i++){const d=document.createElement('div');d.className='streak';
    d.style.left=(Math.random()*100)+'%';d.style.animationDelay=(Math.random()*0.75)+'s';
    d.style.animationDuration=(0.55+Math.random()*0.45)+'s';r.appendChild(d);}
  const sky=$('sky');
  [[40,52,110,26,42],[210,96,150,32,60],[-60,140,120,24,76]].forEach(([l,t,w,h,dur])=>{
    const c=document.createElement('div');c.className='cl';
    c.style.cssText=`left:${l}px;top:${t}px;width:${w}px;height:${h}px;animation-duration:${dur}s`;
    sky.appendChild(c);});
})();

function start(){
  $('gpsBadge').textContent='GPS…';$('gpsBadge').classList.remove('ok');
  if(!navigator.geolocation){showCityPick();return;}
  navigator.geolocation.getCurrentPosition(
    p=>{
      const acc=Math.round(p.coords.accuracy);
      $('gpsBadge').textContent='±'+(acc>=1000?(acc/1000).toFixed(1)+'km':acc+'m');
      $('gpsBadge').classList.add('ok');
      load(p.coords.latitude,p.coords.longitude,null);
    },
    ()=>showCityPick(),
    {enableHighAccuracy:true,timeout:15000,maximumAge:120000}
  );
}
function showCityPick(){
  $('stLoading').style.display='none';$('stDenied').style.display='block';
  $('gpsBadge').textContent='GPS 꺼짐';
  const box=$('cityBtns');box.innerHTML='';
  CITIES.forEach(([n,la,lo])=>{const b=document.createElement('button');b.className='glass';b.textContent=n;
    b.onclick=()=>{$('stDenied').style.display='none';$('stLoading').style.display='block';load(la,lo,n);};
    box.appendChild(b);});
  $('locName').textContent='위치 미확인';
}
$('retryGeo').onclick=()=>{$('stDenied').style.display='none';$('stLoading').style.display='block';start();};
$('locBtn').onclick=start;

async function placeName(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`);
    const j=await r.json();
    return [j.city,j.locality].filter(Boolean).join(' ')||'내 위치';
  }catch(e){return '내 위치';}
}
async function fetchWeather(lat,lon,useKma){
  const m=useKma?'&models=kma_seamless':'';
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index,precipitation`+
    `&hourly=precipitation_probability,weather_code&timezone=auto&forecast_days=1&cell_selection=nearest${m}`;
  const r=await fetch(url);
  if(!r.ok) throw 0;
  const j=await r.json();
  if(!j.current||j.current.temperature_2m==null) throw 0;
  return j;
}
async function load(lat,lon,cityName){
  try{
    let w;
    try{ w=await fetchWeather(lat,lon,true); }
    catch(e){ w=await fetchWeather(lat,lon,false); }
    const ar=await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm10,pm2_5&timezone=auto&cell_selection=nearest`);
    const a=await ar.json();
    $('locName').textContent=cityName||await placeName(lat,lon);
    render(w,a);
  }catch(e){
    $('stLoading').style.display='none';$('stError').style.display='block';
  }
}
const isRainCode=c=>(c>=51&&c<=67)||(c>=71&&c<=77)||(c>=80&&c<=86)||(c>=95);
function pmGrade25(v){return v<=15?0:v<=35?1:v<=75?2:3}
function pmGrade10(v){return v<=30?0:v<=80?1:v<=150?2:3}
const PM_TXT=['좋음','보통','나쁨','매우나쁨'];
function render(w,a){
  const cur=w.current, air=a.current;
  const now=new Date(cur.time), nowH=now.getHours();
  const hh=w.hourly.time.map(t=>new Date(t).getHours());
  let maxProb=0, rainSoonH=null;
  w.hourly.time.forEach((t,i)=>{
    const h=hh[i];
    if(h>=nowH&&h<=Math.min(nowH+8,23)){
      const p=w.hourly.precipitation_probability[i]??0;
      if(p>maxProb)maxProb=p;
      if(rainSoonH===null&&isRainCode(w.hourly.weather_code[i]))rainSoonH=h;
    }
  });
  const g25=pmGrade25(air.pm2_5), g10=pmGrade10(air.pm10), pmWorst=Math.max(g25,g10);
  const wind=cur.wind_speed_10m, temp=cur.temperature_2m, feel=cur.apparent_temperature, uv=cur.uv_index??0;
  const rainingNow=isRainCode(cur.weather_code)||cur.precipitation>0;
  const bads=[],warns=[],goods=[];
  if(rainingNow) bads.push(['🌧','지금 비가 내리고 있어요. 탑은 그대로 두세요.']);
  else if(maxProb>=60) bads.push(['🌧',`강수확률 최대 ${maxProb}%. ${rainSoonH?rainSoonH+'시경 비 가능성 — ':''}오픈에어링은 다음 기회에.`]);
  else if(maxProb>=30) warns.push(['☔',`강수확률 ${maxProb}% — 짧은 코스 위주, 하늘이 어두워지면 바로 클로즈.`]);
  if(pmWorst>=3) bads.push(['😷',`미세먼지 매우나쁨 (PM2.5 ${Math.round(air.pm2_5)}·PM10 ${Math.round(air.pm10)}). 오픈 시 호흡기 직접 노출.`]);
  else if(pmWorst===2) warns.push(['😷','미세먼지 나쁨 — 장거리 오픈은 피하고 정체 구간에선 클로즈 권장.']);
  if(wind>=40) bads.push(['💨',`강풍 ${Math.round(wind)}km/h — 고속 버피팅 위험.`]);
  else if(wind>=25) warns.push(['💨',`바람 다소 강함 (${Math.round(wind)}km/h). 윈드 디플렉터와 창문 업 추천.`]);
  if(feel<=0) bads.push(['🥶',`체감 ${Math.round(feel)}°C — 오픈 주행엔 너무 추워요.`]);
  else if(feel<8) warns.push(['🧣',`체감 ${Math.round(feel)}°C 쌀쌀 — 시트히터와 목토시가 있다면 충분해요.`]);
  if(uv>=8) warns.push(['🕶','자외선 매우 강함 — 썬크림·선글라스·모자 없이는 짧은 주행도 무리예요.']);
  else if(uv>=6) warns.push(['☀','햇빛이 강한 날 — 썬크림 바르고 출발하세요.']);
  if(temp>=33) warns.push(['🥵',`기온 ${Math.round(temp)}°C — 오픈 시 에어컨 무력화. 정체 구간 열사병 주의, 물을 챙기세요.`]);
  else if(temp>=30) warns.push(['🌡',`기온 ${Math.round(temp)}°C — 한낮보다는 아침·저녁의 오픈에어링을 추천해요.`]);
  let level;
  if(bads.length)level='bad';
  else if(warns.length)level='warn';
  else{level='good';goods.push(['🏁','비·미세먼지·바람 모두 완벽. 하늘이 허락한 하루입니다.']);}
  verdictLevel=level;
  const sky=$('sky');
  sky.classList.remove('theme-warn','theme-bad');
  if(level==='warn')sky.classList.add('theme-warn');
  if(level==='bad')sky.classList.add('theme-bad');
  $('rain').classList.toggle('on',rainingNow);
  const V={good:['오픈에어링하기 좋은 날','하늘이 허락한 드라이브'],
           warn:['오픈에어링 할 수 있는 날','몇 가지만 챙기면 충분해요'],
           bad:['오픈에어링 쉬는 날','오늘은 탑을 아껴 두세요']}[level];
  $('vTitle').textContent=V[0];$('vTitle').className='v-'+level;
  $('vSub').textContent=V[1];
  $('vTime').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})
    +' '+String(nowH).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' 기준 · KMA 모델';
  const al=$('alerts');al.innerHTML='';
  [...bads.map(x=>['a-bad',...x]),...warns.map(x=>['a-warn',...x]),...goods.map(x=>['a-good',...x])]
    .forEach(([cl,ic,tx])=>{const d=document.createElement('div');d.className='alert glass '+cl;
      d.innerHTML=`<span class="ic">${ic}</span><span>${tx}</span>`;al.appendChild(d);});
  setG('gTemp',`${Math.round(temp)}° / ${Math.round(feel)}°`, temp>=33||feel<=0?'ng':temp>=30||feel<8?'mid':'ok', temp>=30?'더움':feel<8?'쌀쌀':'적당');
  setG('gUv',(+uv).toFixed(1), uv>=8?'ng':uv>=6?'mid':'ok', uv>=8?'매우강함':uv>=6?'강함':uv>=3?'보통':'낮음');
  setG('gPm25',Math.round(air.pm2_5), g25>=2?'ng':g25===1?'mid':'ok', PM_TXT[g25]);
  setG('gPm10',Math.round(air.pm10), g10>=2?'ng':g10===1?'mid':'ok', PM_TXT[g10]);
  setG('gRain',maxProb+'%', maxProb>=60?'ng':maxProb>=30?'mid':'ok', maxProb>=60?'비 옴':maxProb>=30?'가능성':'맑음');
  setG('gWind',Math.round(wind)+'㎞', wind>=40?'ng':wind>=25?'mid':'ok', wind>=40?'강풍':wind>=25?'다소강함':'양호');
  const tl=$('timeline');tl.innerHTML='';
  const EMO=c=>isRainCode(c)?'🌧':c<=1?'☀':c===2?'⛅':'☁';
  w.hourly.time.forEach((t,i)=>{
    const h=hh[i];if(h<6||h>22)return;
    const prob=w.hourly.precipitation_probability[i]??0, code=w.hourly.weather_code[i];
    let s='ok';
    if(isRainCode(code)||prob>=60||pmWorst>=3)s='ng';
    else if(prob>=30||pmWorst===2)s='mid';
    const div=document.createElement('div');div.className='hr glass'+(h===nowH?' now':'');
    div.innerHTML=`<div class="h">${h}시</div><div class="e">${EMO(code)}</div><div class="d ${s}"></div>`;
    tl.appendChild(div);
  });
  $('stLoading').style.display='none';$('stError').style.display='none';
  $('result').style.display='block';
  setTimeout(()=>{ level==='bad'?playLocked():playOpen(); },650);
  const nowEl=tl.querySelector('.hr.now');
  if(nowEl)nowEl.scrollIntoView({inline:'center',block:'nearest'});
}
function setG(id,val,cls,txt){$(id).textContent=val;const s=$(id+'S');s.textContent=txt;s.className='st '+cls;}
start();
</script>
