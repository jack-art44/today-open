<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>뚜따 — 탑 오픈 판정</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="뚜따">
<meta name="theme-color" content="#12141B">
<link rel="manifest" href='data:application/manifest+json,{"name":"뚜따 - 탑 오픈 판정","short_name":"뚜따","display":"standalone","background_color":"%2312141B","theme_color":"%2312141B","start_url":"."}'>
<style>
@font-face{
  font-family:'DungGeunMo';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3.0/DungGeunMo.woff') format('woff');
  font-display:swap;
}
:root{
  --bg:#12141B; --card:#191C25; --line:#262B38;
  --ink:#F2F3F7; --sub:#8F96A8; --faint:#565D70;
  --red:#C63B44; --mint:#5FD99A; --amber:#F5B94E; --coral:#F26D5F; --ice:#7FC8DE;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh}
.px{font-family:'DungGeunMo',monospace;-webkit-font-smoothing:none;letter-spacing:.02em}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ============ 하늘 (픽셀은 여기에만) ============ */
.sky{position:relative;height:328px;overflow:hidden;
  background:linear-gradient(180deg,#79C0E6 0 26%,#95CFEC 0 48%,#B9E1F0 0 68%,#E4F1EA 0 84%,#F8ECCF 0 100%)}
.sky.theme-warn{background:linear-gradient(180deg,#C9A868 0 26%,#D7BB84 0 48%,#E6D2A6 0 68%,#F0E4C6 0 84%,#F8F0DC 0 100%)}
.sky.theme-bad{background:linear-gradient(180deg,#707D8A 0 26%,#828F9C 0 48%,#98A5B0 0 68%,#B0BCC5 0 84%,#C8D2D9 0 100%)}
.pxsun{position:absolute;top:36px;right:52px;width:6px;height:6px;background:#FFD76A;transition:opacity .6s;
  box-shadow:6px 0 #FFD76A,12px 0 #FFD76A,
   -6px 6px #FFD76A,0 6px #FFE9A0,6px 6px #FFF3C8,12px 6px #FFE9A0,18px 6px #FFD76A,
   -6px 12px #FFD76A,0 12px #FFF3C8,6px 12px #FFF9E4,12px 12px #FFF3C8,18px 12px #FFD76A,
   -6px 18px #FFD76A,0 18px #FFE9A0,6px 18px #FFF3C8,12px 18px #FFE9A0,18px 18px #FFD76A,
   0 24px #FFD76A,6px 24px #FFD76A,12px 24px #FFD76A}
.sky.theme-bad .pxsun{opacity:.12}
.pxcloud{position:absolute;animation:drift linear infinite}
.pxcloud i{position:absolute;background:rgba(255,255,255,.9);display:block}
.sky.theme-bad .pxcloud i{background:#D8DFE5}
@keyframes drift{from{transform:translateX(-170px)}to{transform:translateX(640px)}}
.pxrain{position:absolute;inset:0;display:none;pointer-events:none}
.sky.theme-bad .pxrain.on{display:block}
.pxdrop{position:absolute;top:-16px;width:2px;height:9px;background:#5E7186;animation:fall .8s linear infinite}
@keyframes fall{to{transform:translateY(370px)}}
.road{position:absolute;left:0;right:0;bottom:0;height:46px;background:#20232B;border-top:3px solid #2A2E38}
.road::before{content:"";position:absolute;top:20px;left:0;right:0;height:3px;
  background:repeating-linear-gradient(90deg,#E8C05C 0 22px,transparent 22px 54px);opacity:.85}
.loc{position:absolute;top:12px;left:12px;z-index:5;display:flex;align-items:center;gap:7px;
  background:rgba(18,20,27,.72);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);
  color:#fff;font-size:12.5px;padding:7px 12px;border-radius:8px;font-family:inherit;cursor:pointer}
.loc .pin{width:6px;height:6px;background:var(--red)}
.gps{position:absolute;top:12px;right:12px;z-index:5;background:rgba(18,20,27,.72);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.14);color:#B9C0CF;font-size:11px;padding:8px 10px;border-radius:8px}
.gps.ok{color:var(--mint)}
#carCanvas{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);
  image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer}
#carCanvas.shake{animation:shk .45s}
@keyframes shk{0%,100%{transform:translateX(-50%)}20%{transform:translateX(calc(-50% - 5px))}60%{transform:translateX(calc(-50% + 5px))}}
.stage-cap{position:absolute;left:0;right:0;bottom:52px;text-align:center;font-size:12px;
  color:#20242E;letter-spacing:.04em}
.sky.theme-bad .stage-cap{color:#F2F3F7}

/* ============ 대시보드 (절제) ============ */
.dash{flex:1;background:var(--bg);position:relative;
  padding:26px 18px calc(30px + env(safe-area-inset-bottom))}
.verdict{text-align:center;margin-bottom:6px}
.verdict h1{font-size:38px;font-weight:normal;line-height:1.2}
.verdict h1.v-good{color:var(--mint)}
.verdict h1.v-warn{color:var(--amber)}
.verdict h1.v-bad{color:var(--coral)}
.verdict .bar{width:44px;height:4px;margin:12px auto 10px;background:var(--red)}
.verdict p{color:var(--sub);font-size:14px}
.updated{text-align:center;color:var(--faint);font-size:11px;margin:10px 0 22px}

.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.alert{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;font-size:13.5px;line-height:1.55;
  background:var(--card);border:1px solid var(--line);border-left-width:3px;border-radius:10px}
.alert.a-warn{border-left-color:var(--amber);color:#F4DFB4}
.alert.a-bad{border-left-color:var(--coral);color:#F6C0B8}
.alert.a-good{border-left-color:var(--mint);color:#BCEBD2}

.gauges{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.g{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 8px;text-align:center}
.g .lb{font-size:10.5px;color:var(--sub);margin-bottom:7px;letter-spacing:.02em}
.g .vl{font-size:18px}
.g .st{font-size:11px;margin-top:5px}
.st.ok{color:var(--mint)}.st.mid{color:var(--amber)}.st.ng{color:var(--coral)}

.sec-t{font-size:11.5px;color:var(--sub);letter-spacing:.14em;margin-bottom:12px}
.sec-t b{color:var(--red);font-weight:normal}
.timeline{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:8px;scrollbar-width:none}
.timeline::-webkit-scrollbar{display:none}
.hr{flex:0 0 46px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 4px;text-align:center}
.hr.now{border-color:var(--ice)}
.hr .h{font-size:10px;color:var(--sub)}
.hr .e{font-size:14px;margin:4px 0}
.hr .d{width:7px;height:7px;margin:2px auto 0}
.d.ok{background:var(--mint)}.d.mid{background:var(--amber)}.d.ng{background:var(--coral)}
.legend{display:flex;gap:16px;justify-content:center;font-size:11px;color:var(--sub)}
.legend i{width:7px;height:7px;display:inline-block;margin-right:5px;vertical-align:middle}

.state{padding:56px 20px;text-align:center;color:var(--sub);font-size:14px;line-height:1.8}
.state button,.citybtns button{margin-top:14px;background:var(--card);border:1px solid var(--line);
  color:var(--ink);font-family:inherit;font-size:13px;padding:10px 18px;border-radius:9px;cursor:pointer}
.citybtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.blink{animation:bl 1s steps(2) infinite}
@keyframes bl{to{opacity:.25}}
.foot{text-align:center;color:var(--faint);font-size:11px;margin-top:18px;line-height:1.7}
@media (prefers-reduced-motion: reduce){.pxcloud,.pxdrop{animation:none}}
</style>
</head>
<body>
<div class="wrap">

  <div class="sky" id="sky">
    <div class="pxsun"></div>
    <div class="pxrain" id="rain"></div>
    <button class="loc" id="locBtn"><span class="pin"></span><span id="locName">위치 확인 중…</span></button>
    <div class="gps" id="gpsBadge">GPS…</div>
    <canvas id="carCanvas" width="160" height="64"></canvas>
    <div class="stage-cap px" id="stageCap"></div>
    <div class="road"></div>
  </div>

  <div class="dash">
    <div class="state" id="stLoading"><span class="blink px">▚▚</span><br><br>현 위치의 하늘을 읽는 중…</div>

    <div class="state" id="stDenied" style="display:none">
      위치 권한이 꺼져 있어요.<br>도시를 선택하면 그 지역 기준으로 판정할게요.
      <div class="citybtns" id="cityBtns" style="margin-top:18px"></div>
      <button id="retryGeo">위치 권한 다시 요청</button>
    </div>

    <div class="state" id="stError" style="display:none">
      날씨 데이터를 불러오지 못했어요.<br>네트워크 확인 후 다시 시도해 주세요.
      <br><button onclick="location.reload()">다시 시도</button>
    </div>

    <div id="result" style="display:none">
      <div class="verdict"><h1 class="px" id="vTitle"></h1><div class="bar"></div><p id="vSub"></p></div>
      <div class="updated" id="vTime"></div>
      <div class="alerts" id="alerts"></div>

      <div class="gauges">
        <div class="g"><div class="lb">기온/체감</div><div class="vl px" id="gTemp">—</div><div class="st" id="gTempS"></div></div>
        <div class="g"><div class="lb">자외선 UV</div><div class="vl px" id="gUv">—</div><div class="st" id="gUvS"></div></div>
        <div class="g"><div class="lb">PM2.5</div><div class="vl px" id="gPm25">—</div><div class="st" id="gPm25S"></div></div>
        <div class="g"><div class="lb">PM10</div><div class="vl px" id="gPm10">—</div><div class="st" id="gPm10S"></div></div>
        <div class="g"><div class="lb">강수확률</div><div class="vl px" id="gRain">—</div><div class="st" id="gRainS"></div></div>
        <div class="g"><div class="lb">바람</div><div class="vl px" id="gWind">—</div><div class="st" id="gWindS"></div></div>
      </div>

      <div class="sec-t"><b>▶</b> TODAY 시간대별 뚜따 신호</div>
      <div class="timeline" id="timeline"></div>
      <div class="legend">
        <span><i style="background:var(--mint)"></i>OK</span>
        <span><i style="background:var(--amber)"></i>주의</span>
        <span><i style="background:var(--coral)"></i>클로즈드</span>
      </div>
      <div class="foot">차량을 탭하면 오픈 기믹 재생 · 기상청(KMA) 모델 · Open-Meteo</div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const CITIES=[["서울",37.5665,126.9780],["부산",35.1796,129.0756],["대구",35.8714,128.6014],["인천",37.4563,126.7052],["광주",35.1595,126.8526],["대전",36.3504,127.3845],["제주",33.4996,126.5312]];
let verdictLevel=null, animTimer=null;

/* ================= 350Z 로드스터 (화이트 바디 · 레드 탑) ================= */
const cv=$('carCanvas'), ctx=cv.getContext('2d');
function fitCanvas(){
  const w=Math.min(window.innerWidth-28,470);
  cv.style.width=w+'px'; cv.style.height=(w*64/160)+'px';
}
fitCanvas(); addEventListener('resize',fitCanvas);

const C={
  hi:'#FBFCFE', body:'#EDF0F4', mid:'#E2E6EC', low:'#C9CFD8', rocker:'#AEB5C0',
  red:'#C63B44', redL:'#D9545C', redD:'#A32E37', redSeam:'#8E2731',
  glass:'#A9DEEE', glassD:'#7CC0D6',
  dark:'#1A1D26', cabin:'#232733', seat:'#2C303C',
  tire:'#15171E', rim:'#CBD1DC', rimD:'#848C9C', chrome:'#DCE1E9',
  lamp:'#FFE8B0', amberDot:'#F5A24E', tail:'#E04A3F',
  shadow:'rgba(13,15,20,.4)', spark:'#FFF3C8', lockR:'#FF5A4E'
};
function P(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w||1,h||1);}

/* 350Z 실루엣: 롱 후드 + 리어 헌치 */
function topY(x){
  if(x<8)  return 38;                                  /* 범퍼 페이스 */
  if(x<14) return 35;                                  /* 노즈 */
  if(x<52) return Math.round(35-(x-14)*(5/38));        /* 롱 후드 35→30 */
  if(x<64) return 30;                                  /* 카울 */
  if(x<96) return 29;                                  /* 도어 벨트라인 */
  if(x<104)return 28;
  if(x<112)return 26;                                  /* 리어 헌치 상승 */
  if(x<138)return 25;                                  /* 헌치~데크 */
  if(x<146)return 27;
  return 31;                                           /* 테일 */
}
function drawBody(){
  P(12,60,132,3,C.shadow);                             /* 그림자 */
  for(let x=6;x<152;x++){                              /* 화이트 보디 */
    const t=topY(x);
    P(x,t,1,54-t,C.body);
    P(x,t,1,1,C.hi);
    P(x,t+1,1,2,'#F5F7FA');
  }
  P(6,46,146,4,C.low);                                 /* 하부 셰이드 */
  P(6,50,146,4,C.rocker);                              /* 록커 */
  arch(38,52,14); arch(118,52,14);                     /* 휠 아치 */
  /* 프론트 */
  P(4,38,4,10,C.mid); P(4,44,4,4,C.low);
  P(4,42,6,5,C.dark);                                  /* 범퍼 인테이크 */
  P(10,34,14,3,C.lamp); P(10,34,5,1,'#FFF6DC');        /* 롱 헤드램프 */
  P(24,35,2,2,C.low);
  /* 펜더 길 벤트 (350Z 시그니처) */
  P(50,33,5,2,C.dark); P(51,33,1,1,C.amberDot);
  /* 도어 심 + 세로형 도어핸들 (350Z 시그니처) */
  P(60,30,1,20,C.low); P(94,29,1,21,C.low);
  P(89,29,2,7,C.chrome); P(89,29,1,7,'#F0F3F7');
  /* 사이드 스커트 라인 */
  P(58,48,40,1,'#BAC1CB');
  /* 캐빈 개구부 */
  P(64,26,44,4,C.cabin);
  /* 시트 헤드레스트 */
  P(72,21,5,5,C.seat); P(82,21,5,5,C.seat);
  /* 미러 */
  P(60,24,4,3,C.body); P(59,23,2,3,C.glassD);
  /* 리어 */
  P(146,28,6,4,C.tail); P(146,28,6,1,'#F0776B');       /* 테일램프 */
  P(150,32,3,12,C.mid);
  P(138,53,6,3,C.chrome); P(146,53,6,3,C.chrome);      /* 듀얼 머플러 */
  /* 안테나 */
  P(134,20,1,5,C.dark);
  wheel(38,52); wheel(118,52);
}
function arch(cx,cy,r){
  for(let y=-r;y<=0;y++)for(let x=-r;x<=r;x++)
    if(x*x+y*y<=r*r) P(cx+x,cy+y,1,1,C.dark);
}
function wheel(cx,cy){
  const r=11;
  for(let y=-r;y<=r;y++)for(let x=-r;x<=r;x++){
    const d=x*x+y*y;
    if(d<=r*r){
      if(d>(r-3)*(r-3)) P(cx+x,cy+y,1,1,C.tire);
      else if(d>12) P(cx+x,cy+y,1,1,(x===0||y===0||Math.abs(Math.abs(x)-Math.abs(y))<=1)?C.rim:C.rimD);
      else P(cx+x,cy+y,1,1,C.red);                     /* 레드 센터캡 */
    }
  }
}
function hoop(x){ P(x,17,1,5,C.chrome); P(x+4,17,1,5,C.chrome); P(x,16,5,1,C.chrome); }
function windshield(){
  for(let i=0;i<15;i++){
    const x=52+Math.round(i*0.75), y=30-i;
    P(x,y,2,1,C.dark);
    P(x+2,y,4,1,C.glass);
  }
  P(64,15,2,1,C.dark);                                 /* 헤더 */
}
function drawWindow(down){
  const fullH=9, h=Math.round(fullH*(1-down));
  if(h>0){ P(66,26-h,24,h,C.glassD); P(66,26-h,24,1,C.glass); }
}
/* 레드 소프트탑 곡선 */
function capY(x){
  if(x<72) return 15-(x>=66?1:0);
  if(x<82) return 13;
  if(x<108) return Math.round(13+((x-82)/26)*13);
  return 26;
}
function drawTop(stage){
  if(stage===0||stage===1){
    const lift=(stage===1)?2:0;
    for(let x=65;x<110;x++){
      const y=capY(x)-(stage===1&&x<80?Math.round(lift*(80-x)/15):0);
      P(x,y,1,27-y,C.red);
      P(x,y,1,1,C.redL);
      if((x-65)%9===0) P(x,y+1,1,26-y,C.redSeam);      /* 패브릭 심 */
    }
    P(96,18,8,5,C.glassD); P(96,18,8,1,C.glass);       /* 리어 글라스 */
    if(stage===1) P(64,11,4,1,C.spark);
  }
  else if(stage===2){
    for(let x=82;x<110;x++){const y=capY(x);P(x,y,1,27-y,C.red);P(x,y,1,1,C.redL);}
    for(let i=0;i<12;i++) P(82-i,11+Math.round(i*0.6),2,3,C.redD);   /* 앞판 접힘 */
    P(96,18,8,5,C.glassD);
  }
  else if(stage===3){
    P(86,15,26,4,C.redD); P(89,19,23,4,C.red); P(92,23,20,3,C.redL); /* Z 스택 */
    hoop(72); hoop(82);
  }
  else if(stage===4){
    P(92,22,20,4,C.red); P(94,21,18,1,C.redL);          /* 수납 */
    hoop(72); hoop(82);
  }
  else if(stage===5){
    hoop(72); hoop(82);
    P(90,25,24,3,C.body); P(90,25,24,1,C.hi);           /* 토노 커버 */
    P(76,9,2,2,C.spark); P(108,12,2,2,C.spark); P(92,5,2,2,C.spark);
  }
}
function drawLock(on){
  P(72,2,16,11,'#12141B');
  P(76,7,9,5,on?C.lockR:'#7E2B26');
  P(77,3,1,4,on?C.lockR:'#7E2B26'); P(83,3,1,4,on?C.lockR:'#7E2B26');
  P(77,3,7,1,on?C.lockR:'#7E2B26');
}
function renderCar(stage,winDown,lock,blink){
  ctx.clearRect(0,0,160,64);
  drawBody();
  windshield();
  drawWindow(winDown);
  drawTop(stage);
  if(lock) drawLock(blink);
}
renderCar(0,0,false,false);

const SEQ=[
  {s:0,w:0,  cap:'',d:500},
  {s:0,w:.5, cap:'윈도우 다운…',d:380},
  {s:0,w:1,  cap:'윈도우 다운…',d:380},
  {s:1,w:1,  cap:'프론트 래치 해제!',d:520},
  {s:2,w:1,  cap:'탑 Z-폴딩…',d:480},
  {s:3,w:1,  cap:'탑 폴딩…',d:480},
  {s:4,w:1,  cap:'탑 수납…',d:440},
  {s:5,w:1,  cap:'토노 커버 클로즈 — 뚜따 완료!',d:0},
];
function playOpen(){
  clearTimeout(animTimer); let i=0;
  (function step(){
    const f=SEQ[i];
    renderCar(f.s,f.w,false,false);
    $('stageCap').textContent=f.cap;
    if(++i<SEQ.length) animTimer=setTimeout(step,f.d);
    else setTimeout(()=>$('stageCap').textContent='',2600);
  })();
}
function playLocked(){
  clearTimeout(animTimer); let n=0;
  $('stageCap').textContent='탑 록 유지 — 오늘은 클로즈드';
  (function bl(){renderCar(0,0,true,n%2===0);if(++n<8)animTimer=setTimeout(bl,320);})();
}
cv.addEventListener('click',()=>{
  if(verdictLevel==='bad'){cv.classList.remove('shake');void cv.offsetWidth;cv.classList.add('shake');playLocked();return;}
  if(verdictLevel) playOpen();
});

/* 구름/비 */
(function(){
  const r=$('rain');
  for(let i=0;i<22;i++){const d=document.createElement('div');d.className='pxdrop';
    d.style.left=(Math.random()*100)+'%';d.style.animationDelay=(Math.random()*0.8)+'s';
    d.style.animationDuration=(0.6+Math.random()*0.5)+'s';r.appendChild(d);}
  const sky=$('sky');
  [[60,48,34],[210,88,48],[-30,128,62]].forEach(([l,t,dur])=>{
    const c=document.createElement('div');c.className='pxcloud';

    c.innerHTML='<i style="left:6px;top:0;width:28px;height:7px"></i><i style="left:0;top:7px;width:48px;height:7px"></i><i style="left:14px;top:-7px;width:14px;height:7px"></i>';
    sky.appendChild(c);});
})();

/* ================= 위치 ================= */
function start(){
  $('gpsBadge').textContent='GPS…';$('gpsBadge').classList.remove('ok');
  if(!navigator.geolocation){showCityPick();return;}
  navigator.geolocation.getCurrentPosition(
    p=>{
      const acc=Math.round(p.coords.accuracy);
      $('gpsBadge').textContent='±'+(acc>=1000?(acc/1000).toFixed(1)+'km':acc+'m');
      $('gpsBadge').classList.add('ok');
      load(p.coords.latitude,p.coords.longitude,null);
    },
    ()=>showCityPick(),
    {enableHighAccuracy:true,timeout:15000,maximumAge:120000}
  );
}
function showCityPick(){
  $('stLoading').style.display='none';$('stDenied').style.display='block';
  $('gpsBadge').textContent='GPS 꺼짐';
  const box=$('cityBtns');box.innerHTML='';
  CITIES.forEach(([n,la,lo])=>{const b=document.createElement('button');b.textContent=n;
    b.onclick=()=>{$('stDenied').style.display='none';$('stLoading').style.display='block';load(la,lo,n);};
    box.appendChild(b);});
  $('locName').textContent='위치 미확인';
}
$('retryGeo').onclick=()=>{$('stDenied').style.display='none';$('stLoading').style.display='block';start();};
$('locBtn').onclick=start;

async function placeName(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`);
    const j=await r.json();
    return [j.city,j.locality].filter(Boolean).join(' ')||'내 위치';
  }catch(e){return '내 위치';}
}

/* ================= 날씨 (KMA) ================= */
async function fetchWeather(lat,lon,useKma){
  const model=useKma?'&models=kma_seamless':'';
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,uv_index,precipitation`+
    `&hourly=precipitation_probability,weather_code&timezone=auto&forecast_days=1&cell_selection=nearest${model}`;
  const r=await fetch(url);
  if(!r.ok) throw 0;
  const j=await r.json();
  if(!j.current||j.current.temperature_2m==null) throw 0;
  return j;
}
async function load(lat,lon,cityName){
  try{
    let w;
    try{ w=await fetchWeather(lat,lon,true); }
    catch(e){ w=await fetchWeather(lat,lon,false); }
    const ar=await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm10,pm2_5&timezone=auto&cell_selection=nearest`);
    const a=await ar.json();
    $('locName').textContent=cityName||await placeName(lat,lon);
    render(w,a);
  }catch(e){
    $('stLoading').style.display='none';$('stError').style.display='block';
  }
}

const isRainCode=c=>(c>=51&&c<=67)||(c>=71&&c<=77)||(c>=80&&c<=86)||(c>=95);
function pmGrade25(v){return v<=15?0:v<=35?1:v<=75?2:3}
function pmGrade10(v){return v<=30?0:v<=80?1:v<=150?2:3}
const PM_TXT=['좋음','보통','나쁨','매우나쁨'];

function render(w,a){
  const cur=w.current, air=a.current;
  const now=new Date(cur.time), nowH=now.getHours();
  const hh=w.hourly.time.map(t=>new Date(t).getHours());
  let maxProb=0, rainSoonH=null;
  w.hourly.time.forEach((t,i)=>{
    const h=hh[i];
    if(h>=nowH&&h<=Math.min(nowH+8,23)){
      const p=w.hourly.precipitation_probability[i]??0;
      if(p>maxProb)maxProb=p;
      if(rainSoonH===null&&isRainCode(w.hourly.weather_code[i]))rainSoonH=h;
    }
  });
  const g25=pmGrade25(air.pm2_5), g10=pmGrade10(air.pm10), pmWorst=Math.max(g25,g10);
  const wind=cur.wind_speed_10m, temp=cur.temperature_2m, feel=cur.apparent_temperature, uv=cur.uv_index??0;
  const rainingNow=isRainCode(cur.weather_code)||cur.precipitation>0;

  const bads=[],warns=[],goods=[];
  if(rainingNow) bads.push(['🌧','지금 비가 내리고 있어요. 탑 록 유지!']);
  else if(maxProb>=60) bads.push(['🌧',`강수확률 최대 ${maxProb}%. ${rainSoonH?rainSoonH+'시경 비 가능성 — ':''}뚜따는 다음 기회에.`]);
  else if(maxProb>=30) warns.push(['☔',`강수확률 ${maxProb}% — 짧은 코스 위주, 하늘 어두워지면 즉시 클로즈.`]);
  if(pmWorst>=3) bads.push(['😷',`미세먼지 매우나쁨 (PM2.5 ${Math.round(air.pm2_5)}·PM10 ${Math.round(air.pm10)}). 오픈 시 호흡기 직접 노출.`]);
  else if(pmWorst===2) warns.push(['😷','미세먼지 나쁨 — 장거리 오픈은 피하고 정체 구간에선 클로즈 권장.']);
  if(wind>=40) bads.push(['💨',`강풍 ${Math.round(wind)}km/h — 고속 버피팅 위험.`]);
  else if(wind>=25) warns.push(['💨',`바람 다소 강함 (${Math.round(wind)}km/h). 윈드 디플렉터+창문 업 추천.`]);
  if(feel<=0) bads.push(['🥶',`체감 ${Math.round(feel)}°C — 오픈 주행엔 너무 추워요.`]);
  else if(feel<8) warns.push(['🧣',`체감 ${Math.round(feel)}°C 쌀쌀 — 시트히터·목토시 준비하면 뚜따 가능!`]);
  if(uv>=8) warns.push(['🕶','자외선 매우 강함 — 썬크림·선글라스·모자 필수. 맨살 노출 주의!']);
  else if(uv>=6) warns.push(['☀','햇빛 강한 날 — 썬크림 바르고 출발하세요.']);
  if(temp>=33) warns.push(['🥵',`기온 ${Math.round(temp)}°C — 오픈 시 에어컨 무력화. 정체 구간 열사병 주의, 물 챙기기.`]);
  else if(temp>=30) warns.push(['🌡',`기온 ${Math.round(temp)}°C — 한낮보단 아침·저녁 뚜따 추천.`]);

  let level;
  if(bads.length)level='bad';
  else if(warns.length)level='warn';
  else{level='good';goods.push(['🏁','비·미세먼지·바람 올 클리어. 완벽한 뚜따 데이!']);}
  verdictLevel=level;

  const sky=$('sky');
  sky.classList.remove('theme-warn','theme-bad');
  if(level==='warn')sky.classList.add('theme-warn');
  if(level==='bad')sky.classList.add('theme-bad');
  $('rain').classList.toggle('on',rainingNow);

  const V={good:['뚜따 OK!','지붕 열고 달리기 좋은 날'],
           warn:['조건부 뚜따','주의사항만 지키면 오픈 가능'],
           bad:['뚜따 금지','오늘은 탑 록 유지']}[level];
  $('vTitle').textContent=V[0];$('vTitle').className='px v-'+level;
  $('vSub').textContent=V[1];
  $('vTime').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})
    +' '+String(nowH).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' 기준 · KMA 모델';

  const al=$('alerts');al.innerHTML='';
  [...bads.map(x=>['a-bad',...x]),...warns.map(x=>['a-warn',...x]),...goods.map(x=>['a-good',...x])]
    .forEach(([cl,ic,tx])=>{const d=document.createElement('div');d.className='alert '+cl;
      d.innerHTML=`<span class="ic">${ic}</span><span>${tx}</span>`;al.appendChild(d);});

  setG('gTemp',`${Math.round(temp)}°/${Math.round(feel)}°`, temp>=33||feel<=0?'ng':temp>=30||feel<8?'mid':'ok', temp>=30?'더움':feel<8?'쌀쌀':'적당');
  setG('gUv',(+uv).toFixed(1), uv>=8?'ng':uv>=6?'mid':'ok', uv>=8?'매우강함':uv>=6?'강함':uv>=3?'보통':'낮음');
  setG('gPm25',Math.round(air.pm2_5), g25>=2?'ng':g25===1?'mid':'ok', PM_TXT[g25]);
  setG('gPm10',Math.round(air.pm10), g10>=2?'ng':g10===1?'mid':'ok', PM_TXT[g10]);
  setG('gRain',maxProb+'%', maxProb>=60?'ng':maxProb>=30?'mid':'ok', maxProb>=60?'비 옴':maxProb>=30?'가능성':'맑음');
  setG('gWind',Math.round(wind)+'㎞', wind>=40?'ng':wind>=25?'mid':'ok', wind>=40?'강풍':wind>=25?'다소강함':'양호');

  const tl=$('timeline');tl.innerHTML='';
  const EMO=c=>isRainCode(c)?'🌧':c<=1?'☀':c===2?'⛅':'☁';
  w.hourly.time.forEach((t,i)=>{
    const h=hh[i];if(h<6||h>22)return;
    const prob=w.hourly.precipitation_probability[i]??0, code=w.hourly.weather_code[i];
    let s='ok';
    if(isRainCode(code)||prob>=60||pmWorst>=3)s='ng';
    else if(prob>=30||pmWorst===2)s='mid';
    const div=document.createElement('div');div.className='hr'+(h===nowH?' now':'');
    div.innerHTML=`<div class="h">${h}시</div><div class="e">${EMO(code)}</div><div class="d ${s}"></div>`;
    tl.appendChild(div);
  });

  $('stLoading').style.display='none';$('stError').style.display='none';
  $('result').style.display='block';

  setTimeout(()=>{ level==='bad'?playLocked():playOpen(); },500);
  const nowEl=tl.querySelector('.hr.now');
  if(nowEl)nowEl.scrollIntoView({inline:'center',block:'nearest'});
}
function setG(id,val,cls,txt){$(id).textContent=val;const s=$(id+'S');s.textContent=txt;s.className='st '+cls;}
start();
</script>
